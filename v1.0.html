    function bindLookupField({ inputId, listId, hiddenId, clearButtonId = '', options, selectedValue = '', placeholder = '', emptyValue = '', disabled = false, onChange = null }) {
      const input = $(inputId);
      const list = $(listId);
      const hidden = $(hiddenId);
      const clearButton = clearButtonId ? $(clearButtonId) : null;
      const wrapper = input?.closest('.search-input-wrap');
      if (!input || !list || !hidden || !wrapper) return;

      const normalizedOptions = options.map(opt => typeof opt === 'string' ? { value: opt, label: opt } : opt);
      let dropdown = wrapper.querySelector('.lookup-dropdown');
      if (!dropdown) {
        dropdown = document.createElement('div');
        dropdown.className = 'lookup-dropdown';
        wrapper.appendChild(dropdown);
      }

      list.innerHTML = '';
      input.removeAttribute('list');
      hidden.value = selectedValue || emptyValue || '';
      const selectedOption = normalizedOptions.find(opt => opt.value === hidden.value);
      input.value = selectedOption ? selectedOption.label : '';
      input.placeholder = placeholder;
      input.disabled = disabled;
      wrapper.classList.toggle('disabled', !!disabled);

      const caretIcon = () => `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      `;

      let filteredOptions = normalizedOptions.slice();
      let activeIndex = -1;

      const syncButton = () => {
        if (!clearButton) return;
        const hasValue = !!input.value.trim();
        clearButton.dataset.mode = hasValue ? 'clear' : 'toggle';
        clearButton.classList.toggle('is-clear', hasValue);
        clearButton.innerHTML = hasValue ? '×' : caretIcon();
        clearButton.setAttribute('aria-label', hasValue ? 'Очистить' : 'Открыть список');
      };

      const closeDropdown = () => {
        wrapper.dataset.open = 'false';
        activeIndex = -1;
      };

      const ensureActiveVisible = () => {
        const active = dropdown.querySelector('.lookup-option.active');
        if (active) active.scrollIntoView({ block: 'nearest' });
      };

      const getMatches = (query) => {
        const norm = normalizeLookup(query);
        if (!norm) return normalizedOptions.slice();
        const starts = [];
        const includes = [];
        normalizedOptions.forEach(opt => {
          const label = normalizeLookup(opt.label);
          if (label.startsWith(norm)) starts.push(opt);
          else if (label.includes(norm)) includes.push(opt);
        });
        return [...starts, ...includes];
      };

      const renderDropdown = (query = input.value) => {
        filteredOptions = getMatches(query);
        if (!filteredOptions.length) {
          activeIndex = -1;
          dropdown.innerHTML = '<div class="lookup-empty">Ничего не найдено</div>';
          return;
        }
        if (activeIndex >= filteredOptions.length) activeIndex = filteredOptions.length - 1;
        dropdown.innerHTML = filteredOptions.map((opt, index) => `
          <button type="button" class="lookup-option ${index === activeIndex ? 'active' : ''}" data-index="${index}" data-value="${escapeHtml(opt.value)}">
            ${escapeHtml(opt.label)}
          </button>
        `).join('');
        dropdown.querySelectorAll('.lookup-option').forEach(btn => {
          btn.addEventListener('mouseenter', () => {
            activeIndex = Number(btn.dataset.index);
            dropdown.querySelectorAll('.lookup-option').forEach((optionEl, optionIndex) => {
              optionEl.classList.toggle('active', optionIndex === activeIndex);
            });
          });
          btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const option = filteredOptions[Number(btn.dataset.index)];
            if (option) selectOption(option);
          });
        });
        ensureActiveVisible();
      };

      const selectOption = (option) => {
        const changed = hidden.value !== option.value;
        hidden.value = option.value;
        input.value = option.label;
        syncButton();
        closeDropdown();
        if (changed && onChange) onChange(option.value);
      };

      const resetToCurrent = () => {
        const current = normalizedOptions.find(opt => opt.value === hidden.value);
        input.value = current ? current.label : '';
        syncButton();
      };

      const commit = () => {
        const raw = input.value.trim();
        if (!raw) {
          const next = emptyValue || '';
          const changed = hidden.value !== next;
          hidden.value = next;
          input.value = '';
          syncButton();
          closeDropdown();
          if (changed && onChange) onChange(next);
          return;
        }
        const exact = normalizedOptions.find(opt => normalizeLookup(opt.label) === normalizeLookup(raw));
        const match = exact || getMatches(raw)[0] || null;
        if (!match) {
          resetToCurrent();
          closeDropdown();
          return;
        }
        selectOption(match);
      };

      if (disabled) {
        input.value = '';
        hidden.value = '';
        dropdown.innerHTML = '';
        wrapper.dataset.open = 'false';
        input.onfocus = null;
        input.onclick = null;
        input.onchange = null;
        input.onblur = null;
        input.onkeydown = null;
        input.oninput = null;
        if (clearButton) clearButton.onclick = null;
        syncButton();
        return;
      }

      input.onfocus = () => {
        wrapper.dataset.open = 'true';
        activeIndex = -1;
        renderDropdown();
      };
      input.onclick = () => {
        wrapper.dataset.open = 'true';
        renderDropdown();
      };
      input.onchange = commit;
      input.onblur = () => setTimeout(() => {
        commit();
        closeDropdown();
      }, 100);
      input.oninput = () => {
        wrapper.dataset.open = 'true';
        activeIndex = -1;
        syncButton();
        renderDropdown(input.value);
      };
      input.onkeydown = (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          wrapper.dataset.open = 'true';
          if (!filteredOptions.length) renderDropdown(input.value);
          activeIndex = Math.min(activeIndex + 1, filteredOptions.length - 1);
          renderDropdown(input.value);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          wrapper.dataset.open = 'true';
          if (!filteredOptions.length) renderDropdown(input.value);
          activeIndex = Math.max(activeIndex - 1, 0);
          renderDropdown(input.value);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (wrapper.dataset.open === 'true' && filteredOptions[activeIndex]) selectOption(filteredOptions[activeIndex]);
          else commit();
        } else if (e.key === 'Escape') {
          resetToCurrent();
          closeDropdown();
          input.blur();
        }
      };
      if (clearButton) {
        clearButton.onclick = () => {
          const hasValue = !!input.value.trim();
          if (!hasValue) {
            input.focus();
            wrapper.dataset.open = 'true';
            renderDropdown();
            return;
          }
          input.value = '';
          const next = emptyValue || '';
          const changed = hidden.value !== next;
          hidden.value = next;
          syncButton();
          wrapper.dataset.open = 'true';
          renderDropdown('');
          input.focus();
          if (changed && onChange) onChange(next);
        };
      }
      syncButton();
      closeDropdown();
    }

    function normalizeLookup(value) {
      return String(value || '').toLowerCase().trim().split(' ').filter(Boolean).join(' ');
    }

    function activeCategories() { return state.categories.filter(c => !c.archived); }
    function activeSubcategories() { return state.subcategories.filter(s => !s.archived); }
    function getCategory(id) { return state.categories.find(c => c.id === id) || null; }
    function getSubcategory(id) { return state.subcategories.find(s => s.id === id) || null; }
    function getSubcategoryRaw(id) { return Array.isArray(state.subcategories) ? state.subcategories.find(s => s.id === id) || null : null; }
    function makeCategory(name, type, extra = {}) { return { id: uid('cat'), name, type, archived: false, showInComparison: false, ...extra }; }
    function makeSubcategory(name, categoryId, fixedAmount = null, extra = {}) {
      return {
        id: uid('sub'),
        name,
        categoryId,
        fixedAmount,
        archived: false,
        subscriptionValidUntil: '',
        ignoreSubscriptionExpired: false,
        subscriptionStateSource: null,
        subscriptionLastAmount: null,
        subscriptionPeriodMonths: null,
        subscriptionLastOperationDate: '',
        ...extra,
      };
    }
    function uid(prefix) { return `${prefix}_${Math.random().toString(36).slice(2,9)}${Date.now().toString(36).slice(-4)}`; }
    function round2(n) { return Math.round((Number(n) + Number.EPSILON) * 100) / 100; }
    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, s => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s]));
    }
    function normalizeMoneyString(str) {
      return String(str ?? '').replace(/[\u00A0\u202F]/g, ' ');
    }
    function formatMoney(value) {
      return normalizeMoneyString(new Intl.NumberFormat('ru-RU', {
        style: 'currency',
        currency: 'RUB',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
      }).format(Math.round(Number(value) || 0)));
    }
    function formatMoneyNoCents(value) {
      return formatMoney(value);
    }
    function formatPercentChange(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '—';
      const rounded = Math.round(num * 10) / 10;
      const sign = rounded > 0 ? '+' : rounded < 0 ? '−' : '';
      return `${sign}${Math.abs(rounded).toLocaleString('ru-RU', { minimumFractionDigits: rounded % 1 === 0 ? 0 : 1, maximumFractionDigits: 1 })}%`;
    }
    function formatDate(iso) {
      if (!iso) return '—';
      const [y,m,d] = iso.split('-');
      return `${d}.${m}.${y}`;
    }
    function formatDateTime(iso) {
      if (!iso) return '—';
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return '—';
      const d = String(dt.getDate()).padStart(2, '0');
      const m = String(dt.getMonth() + 1).padStart(2, '0');
      const h = String(dt.getHours()).padStart(2, '0');
      const min = String(dt.getMinutes()).padStart(2, '0');
      return `${d}.${m} ${h}:${min}`;
    }
    function todayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function nowTimestamp() {
      return new Date().toISOString();
    }
    function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); }

    function sumByType(ops, type) {
      return round2(ops.filter(op => getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type === type).reduce((sum, op) => sum + op.amount, 0));
    }

    function signedAmount(op) {
      const type = getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type || 'expense';
      return type === 'expense' ? -op.amount : op.amount;
    }

    function currentPeriodDays() {
      const range = getCappedPeriodRange();
      return range ? diffDaysInclusive(range.from, range.to) : 0;
    }

    function getTrackingStartDate() {
      if (!state.operations.length) return null;
      return state.operations.reduce((min, op) => !min || op.date < min ? op.date : min, null);
    }

    function getCappedPeriodRange() {
      const today = todayISO();
      const trackingStart = getTrackingStartDate();
      if (!trackingStart) return null;
      if (state.period.mode === 'single' && state.period.single) {
        if (state.period.single > today) return null;
        return { from: state.period.single, to: state.period.single };
      }
      if (state.period.mode === 'range' && state.period.from && state.period.to) {
        const from = state.period.from < trackingStart ? trackingStart : state.period.from;
        const to = state.period.to > today ? today : state.period.to;
        if (from > to) return null;
        return { from, to };
      }
      return { from: trackingStart, to: today };
    }

    function analyticsOperationsAllTime() {
      return state.operations.filter(op => op.includeInAnalytics);
    }

    function allTrackedMonthKeys() {
      const trackingStart = getTrackingStartDate();
      if (!trackingStart) return [];
      return monthRange(trackingStart.slice(0,7), todayISO().slice(0,7));
    }

    function buildMonthlyRowsForKeys(ops, keys) {
      if (!keys.length) return [];
      const grouped = new Map();
      ops.forEach(op => {
        const key = op.date.slice(0,7);
        if (!grouped.has(key)) grouped.set(key, { income: 0, expense: 0 });
        const type = getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type || 'expense';
        grouped.get(key)[type] += op.amount;
      });
      return keys.map(key => {
        const row = grouped.get(key) || { income: 0, expense: 0 };
        const [year, month] = key.split('-').map(Number);
        const label = new Date(year, month - 1, 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
        const shortLabel = new Date(year, month - 1, 1).toLocaleDateString('ru-RU', { month: 'short' });
        const income = round2(row.income);
        const expense = round2(row.expense);
        return { key, label: capitalize(label), shortLabel: capitalize(shortLabel.replace('.', '')), income, expense, result: round2(income - expense) };
      });
    }

    function monthlyRowsForPeriod(ops) {
      const range = getCappedPeriodRange();
      if (!range) return [];
      return buildMonthlyRowsForKeys(ops, monthRange(range.from.slice(0,7), range.to.slice(0,7)));
    }

    function overviewMonthlyRows(limit = null) {
      const rows = buildMonthlyRowsForKeys(analyticsOperationsAllTime(), allTrackedMonthKeys());
      return limit ? rows.slice(-limit) : rows;
    }

    function monthRange(fromKey, toKey) {
      const [fy, fm] = fromKey.split('-').map(Number);
      const [ty, tm] = toKey.split('-').map(Number);
      const out = [];
      let y = fy, m = fm;
      while (y < ty || (y === ty && m <= tm)) {
        out.push(`${y}-${String(m).padStart(2, '0')}`);
        m += 1;
        if (m > 12) { m = 1; y += 1; }
      }
      return out;
    }

    function categoryTotals(ops) {
      const bucket = { income: new Map(), expense: new Map() };
      ops.forEach(op => {
        const sub = getSubcategory(op.subcategoryId);
        const cat = getCategory(sub?.categoryId || op.categoryId);
        if (!cat) return;
        const map = bucket[cat.type];
        map.set(cat.id, (map.get(cat.id) || 0) + op.amount);
      });
      return {
        income: [...bucket.income.entries()].map(([id, amount]) => ({ name: getCategory(id)?.name || '—', amount: round2(amount) })).sort((a,b)=>b.amount-a.amount),
        expense: [...bucket.expense.entries()].map(([id, amount]) => ({ name: getCategory(id)?.name || '—', amount: round2(amount) })).sort((a,b)=>b.amount-a.amount),
      };
    }

    function isSubscriptionsCategory(categoryOrId) {
      const category = typeof categoryOrId === 'string' ? getCategory(categoryOrId) : categoryOrId;
      return category?.systemKey === 'subscriptions';
    }

    function addDaysISO(iso, days) {
      const dt = new Date(`${iso}T00:00:00`);
      dt.setDate(dt.getDate() + days);
      return dt.toISOString().slice(0, 10);
    }

    function addMonthsISO(iso, months) {
      const dt = new Date(`${iso}T00:00:00`);
      const baseDate = dt.getDate();
      dt.setDate(1);
      dt.setMonth(dt.getMonth() + months);
      const lastDay = new Date(dt.getFullYear(), dt.getMonth() + 1, 0).getDate();
      dt.setDate(Math.min(baseDate, lastDay));
      return dt.toISOString().slice(0, 10);
    }

    function diffDaysFromToday(iso) {
      if (!iso) return null;
      const today = new Date(`${todayISO()}T00:00:00`);
      const target = new Date(`${iso}T00:00:00`);
      return Math.round((target - today) / 86400000);
    }


    function getSubscriptionCoverageMonths(startIso, validUntilIso, explicitMonths = 0) {
      const explicit = Number(explicitMonths || 0);
      if (explicit > 0) return round2(explicit);
      if (!startIso || !validUntilIso) return 0;
      const start = new Date(`${startIso}T00:00:00`);
      const end = new Date(`${validUntilIso}T00:00:00`);
      if (!(end > start)) return 0;
      let wholeMonths = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      let anchorIso = addMonthsISO(startIso, wholeMonths);
      let anchor = new Date(`${anchorIso}T00:00:00`);
      if (anchor > end) {
        wholeMonths -= 1;
        anchorIso = addMonthsISO(startIso, wholeMonths);
        anchor = new Date(`${anchorIso}T00:00:00`);
      }
      if (+anchor === +end) return round2(Math.max(wholeMonths, 0));
      const nextAnchorIso = addMonthsISO(startIso, wholeMonths + 1);
      const nextAnchor = new Date(`${nextAnchorIso}T00:00:00`);
      const span = nextAnchor - anchor;
      const passed = end - anchor;
      const fraction = span > 0 ? passed / span : 0;
      return round2(Math.max(wholeMonths + fraction, 0));
    }

    function getLatestSubscriptionOperation(subcategoryId) {
      return state.operations
        .filter(op => op.subcategoryId === subcategoryId && isSubscriptionsCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId))
        .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')) || String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')))[0] || null;
    }

    function analyticsOperationsForRange(range) {
      if (!range) return [];
      return analyticsOperationsAllTime().filter(op => op.date >= range.from && op.date <= range.to);
    }

    function startOfMonthISO(iso) {
      return `${iso.slice(0, 7)}-01`;
    }

    function endOfMonthISO(iso) {
      const [year, month] = iso.slice(0, 7).split('-').map(Number);
      return `${iso.slice(0, 7)}-${String(daysInMonth(year, month)).padStart(2, '0')}`;
    }

    function getQuarterNumber(iso) {
      const month = Number(iso.slice(5, 7));
      return Math.floor((month - 1) / 3) + 1;
    }

    function isFullMonthRange(range) {
      return !!range && range.from === startOfMonthISO(range.from) && range.to === endOfMonthISO(range.from) && range.from.slice(0, 7) === range.to.slice(0, 7);
    }

    function isFullQuarterRange(range) {
      if (!range) return false;
      const [fy, fm] = range.from.split('-').map(Number);
      const [ty, tm] = range.to.split('-').map(Number);
      const fq = Math.floor((fm - 1) / 3);
      const tq = Math.floor((tm - 1) / 3);
      if (fy !== ty || fq !== tq) return false;
      const quarterStartMonth = fq * 3 + 1;
      const quarterEndMonth = quarterStartMonth + 2;
      const quarterStart = `${fy}-${String(quarterStartMonth).padStart(2, '0')}-01`;
      const quarterEnd = `${fy}-${String(quarterEndMonth).padStart(2, '0')}-${String(daysInMonth(fy, quarterEndMonth)).padStart(2, '0')}`;
      return range.from === quarterStart && range.to === quarterEnd;
    }

    function isFullYearRange(range) {
      if (!range) return false;
      const [fy] = range.from.split('-').map(Number);
      const [ty] = range.to.split('-').map(Number);
      return fy === ty && range.from === `${fy}-01-01` && range.to === `${fy}-12-31`;
    }

    function getMonthPeriodLabel(range) {
      const [year, month] = range.from.slice(0, 7).split('-').map(Number);
      return new Date(year, month - 1, 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
    }

    function getQuarterPeriodLabel(range) {
      return `${getQuarterNumber(range.from)} квартал ${range.from.slice(0, 4)}`;
    }

    function getYearPeriodLabel(range) {
      return range.from.slice(0, 4);
    }

    function getRangePeriodLabel(range) {
      return `${formatDate(range.from)} — ${formatDate(range.to)}`;
    }

    function getSelectedPeriodRange() {
      if (state.period.mode === 'single' && state.period.single) {
        return { from: state.period.single, to: state.period.single };
      }
      if (state.period.mode === 'range' && state.period.from && state.period.to) {
        return { from: state.period.from, to: state.period.to };
      }
      return null;
    }

    function capRangeToTrackedBounds(range) {
      if (!range) return null;
      const trackingStart = getTrackingStartDate();
      if (!trackingStart) return null;
      const today = todayISO();
      const from = range.from < trackingStart ? trackingStart : range.from;
      const to = range.to > today ? today : range.to;
      if (from > to) return null;
      return { from, to };
    }

    function getPreviousComparableRangeMeta(range) {
      if (isFullMonthRange(range)) {
        const [year, month] = range.from.slice(0, 7).split('-').map(Number);
        const prev = new Date(year, month - 2, 1);
        const py = prev.getFullYear();
        const pm = prev.getMonth() + 1;
        const previousRange = {
          from: `${py}-${String(pm).padStart(2, '0')}-01`,
          to: `${py}-${String(pm).padStart(2, '0')}-${String(daysInMonth(py, pm)).padStart(2, '0')}`,
        };
        return { previousRange, label: getMonthPeriodLabel(previousRange), labelKind: 'month' };
      }
      if (isFullQuarterRange(range)) {
        const [year, month] = range.from.split('-').map(Number);
        const quarterIndex = Math.floor((month - 1) / 3);
        const prevQuarterDate = new Date(year, quarterIndex * 3 - 3, 1);
        const py = prevQuarterDate.getFullYear();
        const startMonth = prevQuarterDate.getMonth() + 1;
        const endMonth = startMonth + 2;
        const previousRange = {
          from: `${py}-${String(startMonth).padStart(2, '0')}-01`,
          to: `${py}-${String(endMonth).padStart(2, '0')}-${String(daysInMonth(py, endMonth)).padStart(2, '0')}`,
        };
        return { previousRange, label: getQuarterPeriodLabel(previousRange), labelKind: 'quarter' };
      }
      if (isFullYearRange(range)) {
        const prevYear = Number(range.from.slice(0, 4)) - 1;
        const previousRange = { from: `${prevYear}-01-01`, to: `${prevYear}-12-31` };
        return { previousRange, label: getYearPeriodLabel(previousRange), labelKind: 'year' };
      }
      const days = diffDaysInclusive(range.from, range.to);
      const prevTo = addDaysISO(range.from, -1);
      const prevFrom = addDaysISO(prevTo, -(days - 1));
      const previousRange = { from: prevFrom, to: prevTo };
      return { previousRange, label: getRangePeriodLabel(previousRange), labelKind: 'range' };
    }

    function getChangesPanelState() {
      const trackingStart = getTrackingStartDate();
      if (!trackingStart) return { status: 'no_data' };
      if (state.period.mode === 'all') return { status: 'all_time' };
      const selectedRange = getSelectedPeriodRange();
      if (!selectedRange) return { status: 'no_data' };
      const comparisonMeta = getPreviousComparableRangeMeta(selectedRange);
      const previousRange = comparisonMeta.previousRange;
      const currentRange = capRangeToTrackedBounds(selectedRange);
      if (previousRange.from < trackingStart) {
        return { status: 'incomplete_previous', currentRange, previousRange, previousLabel: comparisonMeta.label, previousLabelKind: comparisonMeta.labelKind };
      }
      if (!currentRange) {
        return { status: 'no_data', currentRange, previousRange, previousLabel: comparisonMeta.label, previousLabelKind: comparisonMeta.labelKind };
      }
      const currentOps = analyticsOperationsForRange(currentRange);
      const previousOps = analyticsOperationsForRange(previousRange);
      if (!previousOps.length) {
        return { status: 'no_data', currentRange, previousRange, previousLabel: comparisonMeta.label, previousLabelKind: comparisonMeta.labelKind };
      }
      return { status: 'ok', currentRange, previousRange, previousLabel: comparisonMeta.label, previousLabelKind: comparisonMeta.labelKind, currentOps, previousOps };
    }

    function buildChangeRows(currentOps, previousOps, selectedNames = []) {
      const currentTotals = categoryTotals(currentOps).expense;
      const previousTotals = categoryTotals(previousOps).expense;
      const currentMap = new Map(currentTotals.map(row => [row.name, row.amount]));
      const previousMap = new Map(previousTotals.map(row => [row.name, row.amount]));
      const selectedSet = new Set((selectedNames || []).filter(Boolean));
      const names = [...previousMap.keys()].filter(name => !selectedSet.size || selectedSet.has(name));
      return names.map(name => {
        const current = round2(currentMap.get(name) || 0);
        const previous = round2(previousMap.get(name) || 0);
        const delta = round2(current - previous);
        return { name, current, previous, delta };
      }).filter(row => row.previous !== 0).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
    }

    function getSubscriptionDashboardRows() {
      const rows = state.subcategories
        .filter(sub => isSubscriptionsCategory(sub.categoryId) && !sub.archived)
        .map(sub => {
          const latestOp = getLatestSubscriptionOperation(sub.id);
          const validUntil = sub.subscriptionValidUntil || latestOp?.subscriptionValidUntil || '';
          const daysLeft = diffDaysFromToday(validUntil);
          const isExpired = daysLeft !== null && daysLeft < 0;
          const isIgnoredExpired = isExpired && sub.ignoreSubscriptionExpired;
          const lastAmount = Number(sub.subscriptionLastAmount || latestOp?.amount || 0);
          const months = getSubscriptionCoverageMonths(sub.subscriptionLastOperationDate || latestOp?.date || '', validUntil, sub.subscriptionPeriodMonths || latestOp?.subscriptionPeriodMonths || 0);
          let monthlyCost = 0;
          if (Number.isFinite(lastAmount) && lastAmount > 0) {
            monthlyCost = months > 0 ? round2(lastAmount / months) : round2(lastAmount);
          } else if (Number.isFinite(Number(sub.fixedAmount)) && Number(sub.fixedAmount) > 0) {
            monthlyCost = round2(Number(sub.fixedAmount));
          }
          let statusText = 'Дата не указана';
          let statusClass = 'neutral';
          if (daysLeft !== null) {
            if (daysLeft < 0) {
              statusText = sub.ignoreSubscriptionExpired ? `Просрочена на ${Math.abs(daysLeft)} дн. · игнорируется` : `Просрочена на ${Math.abs(daysLeft)} дн.`;
              statusClass = sub.ignoreSubscriptionExpired ? 'neutral' : 'expense';
            } else if (daysLeft === 0) {
              statusText = 'Заканчивается сегодня';
              statusClass = 'expense';
            } else {
              statusText = `Осталось ${daysLeft} дн.`;
              statusClass = daysLeft <= 7 ? 'expense' : 'income';
            }
          }
          const isActive = Boolean(validUntil) && !isExpired;
          return {
            id: sub.id,
            name: sub.name,
            validUntil,
            daysLeft,
            isExpired,
            isIgnoredExpired,
            isActive,
            monthlyCost,
            statusText,
            statusClass,
          };
        });
      return rows.sort((a, b) => {
        const priority = row => row.isExpired && !row.isIgnoredExpired ? 0 : !row.isExpired ? 1 : 2;
        const pa = priority(a), pb = priority(b);
        if (pa !== pb) return pa - pb;
        const da = a.daysLeft === null ? 999999 : a.daysLeft;
        const db = b.daysLeft === null ? 999999 : b.daysLeft;
        if (da !== db) return da - db;
        return a.name.localeCompare(b.name, 'ru');
      });
    }

    function canDeleteCategory(id) {
      if (isSubscriptionsCategory(id)) return false;
      return !state.subcategories.some(s => s.categoryId === id) && !state.operations.some(op => (getSubcategory(op.subcategoryId)?.categoryId || op.categoryId) === id);
    }
    function canDeleteSubcategory(id) {
      return !state.operations.some(op => op.subcategoryId === id);
    }
    function canChangeCategoryType(id) {
      if (isSubscriptionsCategory(id)) return false;
      return !state.operations.some(op => (getSubcategory(op.subcategoryId)?.categoryId || op.categoryId) === id);
    }
    function diffDaysInclusive(a, b) {
      const start = new Date(`${a}T00:00:00`);
      const end = new Date(`${b}T00:00:00`);
      return Math.floor((end - start) / 86400000) + 1;
    }
    function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }
    function renderSettings() {
      if ($('themeSelect')) $('themeSelect').value = state.settings.theme || 'default';
      renderOperationsHistory();
    }
    function applyTheme(theme) {
      document.body.dataset.theme = theme || 'default';
    }
    function themeLabel(theme) {
      if (theme === 'light') return 'Light';
      if (theme === 'cats') return 'Cute Cats';
      if (theme === 'vasik') return 'Vasik edition';
      return 'Graphite';
    }

    function showToast(title, text) {
      const wrap = $('toastWrap');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<div><strong>${escapeHtml(title)}</strong><p>${escapeHtml(text)}</p></div><button type="button" aria-label="Закрыть">×</button>`;
      toast.querySelector('button').addEventListener('click', () => toast.remove());
      wrap.appendChild(toast);
      setTimeout(() => toast.remove(), TOAST_DURATION);
    }
  </script>
</body>
</html>
