<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анализатор личных финансовых потоков</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #172133;
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --blue: #60a5fa;
      --green: #22c55e;
      --green-soft: rgba(34,197,94,0.14);
      --red: #ef4444;
      --red-soft: rgba(239,68,68,0.14);
      --amber: #d6a54a;
      --amber-soft: rgba(214,165,74,0.14);
      --shadow: 0 16px 34px rgba(0,0,0,0.28);
      --radius: 18px;
      --radius-sm: 12px;
    }
    body[data-theme="light"] {
      color: #0f172a;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
    }
    body[data-theme="light"] .panel,
    body[data-theme="light"] .modal,
    body[data-theme="light"] .toast,
    body[data-theme="light"] .popover {
      background: rgba(255,255,255,0.94);
      border-color: rgba(15,23,42,0.08);
      box-shadow: 0 16px 34px rgba(15,23,42,0.08);
    }
    body[data-theme="light"] .tab-btn,
    body[data-theme="light"] .btn,
    body[data-theme="light"] .chip,
    body[data-theme="light"] .checkbox,
    body[data-theme="light"] .radio-pill,
    body[data-theme="light"] input,
    body[data-theme="light"] select,
    body[data-theme="light"] textarea {
      background: rgba(255,255,255,0.96);
      color: #0f172a;
      border-color: rgba(15,23,42,0.12);
    }
    body[data-theme="light"] .btn-primary { background: var(--blue); color: #091321; }
    body[data-theme="light"] .btn-danger { background: var(--red-soft); color: #b91c1c; border-color: rgba(239,68,68,0.22); }
    body[data-theme="light"] .btn-success { background: var(--green-soft); color: #15803d; border-color: rgba(34,197,94,0.22); }
    body[data-theme="light"] .btn-amber { background: var(--amber-soft); color: #a16207; border-color: rgba(214,165,74,0.22); }
    body[data-theme="light"] .btn-ghost { background: transparent; color: #0f172a; border-color: rgba(15,23,42,0.12); }
    body[data-theme="light"] .tab-btn.active,
    body[data-theme="light"] .chip.active { background: rgba(96,165,250,0.14); }
    body[data-theme="light"] .table-wrap,
    body[data-theme="light"] .kpi-card,
    body[data-theme="light"] .stats-card,
    body[data-theme="light"] .item-card,
    body[data-theme="light"] .sub-row,
    body[data-theme="light"] .legend-item,
    body[data-theme="light"] .breakdown-group,
    body[data-theme="light"] .chart-card { background: rgba(255,255,255,0.84); border-color: rgba(15,23,42,0.08); }
    body[data-theme="light"] th { background: rgba(15,23,42,0.04); color: #64748b; }
    body[data-theme="light"] .muted,
    body[data-theme="light"] .kpi-label,
    body[data-theme="light"] .field label,
    body[data-theme="light"] .toast p { color: #64748b; }
    body[data-theme="light"] .neutral,
    body[data-theme="light"] .donut-total,
    body[data-theme="light"] .track-pct,
    body[data-theme="light"] .badge.out { color: #0f172a; }
    body[data-theme="light"] .badge.expense { background: rgba(239,68,68,0.12); color: #b91c1c; }
    body[data-theme="light"] .badge.income { background: rgba(34,197,94,0.12); color: #15803d; }
    body[data-theme="light"] .badge.debt-open { background: rgba(214,165,74,0.16); color: #a16207; }
    body[data-theme="light"] .badge.debt-repaid { background: rgba(34,197,94,0.12); color: #166534; }
    body[data-theme="light"] .badge.action-edit { background: rgba(96,165,250,0.16); color: #1d4ed8; }
    body[data-theme="light"] .badge.action-add { background: rgba(34,197,94,0.14); color: #15803d; }
    body[data-theme="light"] .donut::after { background: #ffffff; border-color: rgba(15,23,42,0.08); }
    body[data-theme="light"] .track { background: rgba(15,23,42,0.08); }

    body[data-theme="vasik"]::after {
      opacity: 1;
      background:
        linear-gradient(180deg, rgba(251,245,238,0.72) 0%, rgba(246,236,226,0.80) 100%),
        radial-gradient(circle at 16% 18%, rgba(255,255,255,0.16), transparent 16%),
        radial-gradient(circle at 84% 16%, rgba(255,255,255,0.10), transparent 18%);
    }
    body[data-theme="vasik"] .panel,
    body[data-theme="vasik"] .modal,
    body[data-theme="vasik"] .toast,
    body[data-theme="vasik"] .popover {
      background: rgba(255, 249, 243, 0.72);
      border-color: rgba(163, 120, 92, 0.14);
      box-shadow: 0 18px 40px rgba(125, 89, 63, 0.12);
      backdrop-filter: blur(18px) saturate(1.08);
      -webkit-backdrop-filter: blur(18px) saturate(1.08);
    }
    body[data-theme="vasik"] .tab-btn,
    body[data-theme="vasik"] .btn,
    body[data-theme="vasik"] .chip,
    body[data-theme="vasik"] .checkbox,
    body[data-theme="vasik"] .radio-pill,
    body[data-theme="vasik"] input,
    body[data-theme="vasik"] select,
    body[data-theme="vasik"] textarea {
      background: rgba(255,252,248,0.82);
      color: #5a463d;
      border-color: rgba(166, 126, 98, 0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
    }
    body[data-theme="vasik"] .btn-primary { background: rgba(199, 151, 121, 0.22); color: #7b5642; border-color: rgba(166,126,98,0.22); }
    body[data-theme="vasik"] .btn-danger { background: rgba(239, 68, 68, 0.10); color: #b45309; border-color: rgba(180,83,9,0.18); }
    body[data-theme="vasik"] .btn-success { background: rgba(34, 197, 94, 0.10); color: #3f6b44; border-color: rgba(63,107,68,0.18); }
    body[data-theme="vasik"] .btn-amber { background: rgba(214, 165, 74, 0.14); color: #9c6d28; border-color: rgba(156,109,40,0.18); }
    body[data-theme="vasik"] .btn-ghost { background: rgba(255,250,244,0.40); color: #6d5548; border-color: rgba(166,126,98,0.12); }
    body[data-theme="vasik"] .tab-btn.active,
    body[data-theme="vasik"] .chip.active {
      background: rgba(214, 185, 162, 0.24);
      border-color: rgba(166, 126, 98, 0.22);
      color: #6d4f3c;
    }
    body[data-theme="vasik"] .table-wrap,
    body[data-theme="vasik"] .kpi-card,
    body[data-theme="vasik"] .stats-card,
    body[data-theme="vasik"] .item-card,
    body[data-theme="vasik"] .sub-row,
    body[data-theme="vasik"] .legend-item,
    body[data-theme="vasik"] .breakdown-group,
    body[data-theme="vasik"] .chart-card {
      background: rgba(255,252,248,0.60);
      border-color: rgba(166,126,98,0.12);
      backdrop-filter: blur(14px) saturate(1.02);
      -webkit-backdrop-filter: blur(14px) saturate(1.02);

  <script>
    const STORAGE_KEY = 'finance-analyzer-v3';
    const CHART_COLORS = ['#ef4444','#f97316','#f59e0b','#eab308','#60a5fa','#a855f7'];
    const MONTHLY_OVERVIEW_PAGE_SIZE = 6;
    const DASHBOARD_OVERVIEW_MONTHS = 6;
    const TOAST_DURATION = 6500;
    const TABS = [
      { id: 'reports', label: 'Отчеты' },
      { id: 'operations', label: 'Операции' },
      { id: 'dashboard', label: 'Дашборд' },
      { id: 'categories', label: 'Категории' },
      { id: 'settings', label: 'Настройки' },
    ];

    const state = loadState();
    const ui = {
      activeTab: 'reports',
      selectedCategoryId: null,
      operationFilters: { categoryId: 'all', subcategoryId: 'all', analytics: 'all', search: '' },
      operationSort: { date: null, amount: null },
      monthlyOverviewPage: 1,
      operationsPage: 1,
      operationsPerPage: 25,
      periodDraft: { mode: 'single', single: '', from: '', to: '' },
      pendingSubscriptionTransfer: null,
      changesSortDir: 'desc',
    };

    const $ = (id) => document.getElementById(id);

    init();

    function init() {
      ensureDataShape();
      if (!ui.selectedCategoryId) ui.selectedCategoryId = activeCategories()[0]?.id || state.categories[0]?.id || null;
      applyTheme(state.settings.theme);
      renderTabs();
      bindEvents();
      renderAll();
    }

    function defaultData() {
      const cats = [
        makeCategory('Подписки', 'expense', { systemKey: 'subscriptions' }),
      ];
      return {
        version: 5,
        settings: {
          lastOperationDate: todayISO(),
          lastOperationCategoryId: '',
          lastOperationSubcategoryId: '',
          theme: 'vasik',
        },
        period: { mode: 'all', single: '', from: '', to: '' },
        categories: cats,
        subcategories: [],
        operations: [],
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('finance-analyzer-v2');
        return raw ? JSON.parse(raw) : defaultData();
      } catch (e) {
        console.error(e);
        return defaultData();
      }
    }

    function ensureDataShape() {
      const def = defaultData();
      state.version = 5;
      state.settings = state.settings || def.settings;
      state.settings.lastOperationDate = state.settings.lastOperationDate || todayISO();
      state.settings.lastOperationCategoryId = state.settings.lastOperationCategoryId || '';
      state.settings.lastOperationSubcategoryId = state.settings.lastOperationSubcategoryId || '';
      if (!state.settings.theme || state.settings.theme === 'default') state.settings.theme = 'vasik';
      delete state.settings.startingBalance;
      state.period = state.period || def.period;
      state.categories = Array.isArray(state.categories) ? state.categories : def.categories;
      state.categories = state.categories.map(cat => ({
        ...cat,
        showInComparison: cat.showInComparison === true,
      }));
      state.subcategories = Array.isArray(state.subcategories) ? state.subcategories : def.subcategories;

      const legacyDefaultCategoryNames = new Set(['Еда', 'Транспорт', 'Жильё', 'Развлечения', 'Подписки', 'Ежемесячные траты', 'Доходы']);
      const legacyDefaultSubcategoryNames = new Set(['Продукты', 'Кафе', 'Доставка', 'Метро', 'Такси', 'Бензин', 'Аренда', 'Коммунальные', 'Кино', 'Игры', 'Музыка', 'Видео', 'Связь', 'Интернет', 'Зарплата', 'Фриланс', 'Прочие доходы']);
      const shouldResetToSystemOnlyDefaults = !state.operations.length
        && state.categories.length
        && state.categories.every(cat => legacyDefaultCategoryNames.has(String(cat.name || '').trim()))
        && state.subcategories.every(sub => legacyDefaultSubcategoryNames.has(String(sub.name || '').trim()));
      if (shouldResetToSystemOnlyDefaults) {
        state.categories = def.categories.map(cat => ({ ...cat }));
        state.subcategories = [];
      }

      let subscriptionCategory = state.categories.find(c => c.systemKey === 'subscriptions')
        || state.categories.find(c => c.type === 'expense' && String(c.name || '').trim().toLowerCase() === 'подписки');
      if (!subscriptionCategory) {
        subscriptionCategory = makeCategory('Подписки', 'expense', { systemKey: 'subscriptions' });
        state.categories.push(subscriptionCategory);
      } else {
        subscriptionCategory.systemKey = 'subscriptions';
        subscriptionCategory.type = 'expense';
        subscriptionCategory.name = 'Подписки';
      }

      state.subcategories = state.subcategories.map(sub => ({
        ...sub,
        fixedAmount: Number.isFinite(Number(sub.fixedAmount)) && Number(sub.fixedAmount) > 0 ? round2(Number(sub.fixedAmount)) : null,
        subscriptionValidUntil: sub.subscriptionValidUntil || '',
        ignoreSubscriptionExpired: sub.ignoreSubscriptionExpired === true,
        subscriptionStateSource: sub.subscriptionStateSource || null,
        subscriptionLastAmount: Number.isFinite(Number(sub.subscriptionLastAmount)) && Number(sub.subscriptionLastAmount) > 0 ? round2(Number(sub.subscriptionLastAmount)) : null,
        subscriptionPeriodMonths: Number.isFinite(Number(sub.subscriptionPeriodMonths)) && Number(sub.subscriptionPeriodMonths) > 0 ? Number(sub.subscriptionPeriodMonths) : null,
        subscriptionLastOperationDate: sub.subscriptionLastOperationDate || '',
      }));

      state.operations = Array.isArray(state.operations) ? state.operations : [];
      state.operations = state.operations.map(op => {
        const sub = getSubcategoryRaw(op.subcategoryId);
        const categoryId = sub?.categoryId || op.categoryId || '';
        const includeInAnalytics = op.includeInAnalytics !== false;
        let debtStatus = op.debtStatus || null;
        if (!includeInAnalytics && !debtStatus) debtStatus = 'open';
        if (includeInAnalytics) debtStatus = null;
        if (debtStatus !== 'open' && debtStatus !== 'repaid' && debtStatus !== null) debtStatus = 'open';
        const createdAt = op.createdAt || op.updatedAt || `${op.date || todayISO()}T12:00:00`;
        const updatedAt = op.updatedAt || createdAt;
        const lastAction = op.lastAction || (updatedAt !== createdAt ? 'updated' : 'created');
        return {
          id: op.id || uid('op'),
          categoryId,
          subcategoryId: op.subcategoryId || '',
          date: op.date || todayISO(),
          amount: round2(Number(op.amount || 0)),
          description: op.description || '',
          includeInAnalytics,
          debtStatus,
          createdAt,
          updatedAt,
          lastAction,
          subscriptionValidUntil: op.subscriptionValidUntil || '',
          subscriptionPeriodMonths: Number.isFinite(Number(op.subscriptionPeriodMonths)) && Number(op.subscriptionPeriodMonths) > 0 ? Number(op.subscriptionPeriodMonths) : null,
        };
      }).filter(op => op.subcategoryId);
      save(false);
    }

    function save(render = true) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (render) renderAll();
    }

    function bindEvents() {
      $('tabs').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-tab]');
        if (!btn) return;
        ui.activeTab = btn.dataset.tab;
        renderTabs();
        renderScreens();
      });

      $('periodButton').addEventListener('click', (e) => {
        e.stopPropagation();
        ui.periodDraft = JSON.parse(JSON.stringify(state.period));
        syncPeriodDraftToUI();
        $('periodPopover').classList.toggle('active');
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.period-wrap')) $('periodPopover').classList.remove('active');
      });
      $('modeSingleBtn').addEventListener('click', () => { ui.periodDraft.mode = 'single'; syncPeriodDraftToUI(); });
      $('modeRangeBtn').addEventListener('click', () => { ui.periodDraft.mode = 'range'; syncPeriodDraftToUI(); });
      $('periodResetBtn').addEventListener('click', () => {
        ui.periodDraft = { mode: 'all', single: '', from: '', to: '' };
        state.period = { mode: 'all', single: '', from: '', to: '' };
        ui.operationsPage = 1;
        save();
        $('periodPopover').classList.remove('active');
      });
      $('periodApplyBtn').addEventListener('click', applyPeriodDraft);
      document.querySelectorAll('[data-quick]').forEach(btn => btn.addEventListener('click', () => applyQuickPeriod(btn.dataset.quick)));
      $('periodSingle').addEventListener('input', e => ui.periodDraft.single = e.target.value);
      $('periodFrom').addEventListener('input', e => ui.periodDraft.from = e.target.value);
      $('periodTo').addEventListener('input', e => ui.periodDraft.to = e.target.value);

      $('addOperationBtn').addEventListener('click', () => openOperationModal());
      $('closeOperationBtn').addEventListener('click', closeOperationModal);
      $('saveOperationBtn').addEventListener('click', saveOperationFromModal);
      $('deleteOperationBtn').addEventListener('click', deleteOperationFromModal);
      $('opAnalytics').addEventListener('change', syncDebtControls);
      $('opDate').addEventListener('change', syncSubscriptionPresetDate);
      $('opSubscriptionValidUntil')?.addEventListener('input', () => { $('opSubscriptionMonths').value = ''; syncSubscriptionPresetButtons(); });
      document.querySelectorAll('[data-sub-months]').forEach(btn => btn.addEventListener('click', () => applySubscriptionPreset(btn.dataset.subMonths)));

      $('addCategoryBtn').addEventListener('click', () => openEntityModal('category'));
      $('addSubcategoryBtn').addEventListener('click', () => openEntityModal('subcategory'));
      $('entityType').addEventListener('change', syncEntityCompareVisibility);
    $('closeEntityBtn').addEventListener('click', closeEntityModal);
      $('saveEntityBtn').addEventListener('click', saveEntity);
      $('entityCategory')?.addEventListener('change', syncEntitySubscriptionFields);
      $('closeSubscriptionTransferBtn')?.addEventListener('click', closeSubscriptionTransferModal);
      $('saveSubscriptionTransferBtn')?.addEventListener('click', confirmSubscriptionTransfer);

      $('downloadBackupBtn').addEventListener('click', downloadBackup);
      $('uploadBackupBtn').addEventListener('click', () => $('backupInput').click());
      $('backupInput').addEventListener('change', uploadBackup);

      bindDateInputs();
      $('themeSelect')?.addEventListener('change', (e) => {
        state.settings.theme = e.target.value || 'default';
        applyTheme(state.settings.theme);
        save(false);
        showToast('Тема изменена', themeLabel(state.settings.theme));
      });
    }

    function bindDateInputs() {
      document.querySelectorAll('input[type="date"]').forEach(input => {
        if (input.dataset.fullClickBound === '1') return;
        input.dataset.fullClickBound = '1';
        input.addEventListener('click', () => {
          try {
            if (typeof input.showPicker === 'function') input.showPicker();
          } catch (e) {}
        });
      });
    }

    function toggleChangesSort() {
      ui.changesSortDir = ui.changesSortDir === 'desc' ? 'asc' : 'desc';
      renderDashboard();
    }

    function renderAll() {
      renderTabs();
      renderScreens();
      renderPeriodButton();
      renderOperations();
      renderReports();
      renderDashboard();
      renderCategories();
      renderSettings();
    }

    function renderTabs() {
      $('tabs').innerHTML = TABS.map(tab => `<button class="tab-btn ${ui.activeTab === tab.id ? 'active' : ''}" data-tab="${tab.id}">${tab.label}</button>`).join('');
    }

    function renderScreens() {
      document.querySelectorAll('.screen').forEach(screen => screen.classList.toggle('active', screen.id === `screen-${ui.activeTab}`));
    }

    function renderPeriodButton() {
      $('periodButton').textContent = periodLabel();
    }

    function syncPeriodDraftToUI() {
      const mode = ui.periodDraft.mode;
      $('modeSingleBtn').classList.toggle('active', mode === 'single');
      $('modeRangeBtn').classList.toggle('active', mode === 'range');
      $('periodSingleField').style.display = mode === 'single' ? 'flex' : 'none';
      $('periodFromField').style.display = mode === 'range' ? 'flex' : 'none';
      $('periodToField').style.display = mode === 'range' ? 'flex' : 'none';
      $('periodSingle').value = ui.periodDraft.single || '';
      $('periodFrom').value = ui.periodDraft.from || '';
      $('periodTo').value = ui.periodDraft.to || '';
    }

    function applyPeriodDraft() {
      const draft = ui.periodDraft;
      if (draft.mode === 'single') {
        if (!draft.single) { alert('Выбери дату.'); return; }
        state.period = { mode: 'single', single: draft.single, from: '', to: '' };
      } else if (draft.mode === 'range') {
        if (!draft.from || !draft.to) { alert('Выбери обе даты периода.'); return; }
        if (draft.from > draft.to) { alert('Дата начала не может быть позже даты конца.'); return; }
        state.period = { mode: 'range', single: '', from: draft.from, to: draft.to };
      } else {
        state.period = { mode: 'all', single: '', from: '', to: '' };
      }
      ui.operationsPage = 1;
      save();
      $('periodPopover').classList.remove('active');
    }

    function applyQuickPeriod(kind) {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      if (kind === 'today') {
        state.period = { mode: 'single', single: `${yyyy}-${mm}-${dd}`, from: '', to: '' };
      } else if (kind === 'month') {
        state.period = { mode: 'range', single: '', from: `${yyyy}-${mm}-01`, to: `${yyyy}-${mm}-${String(daysInMonth(yyyy, now.getMonth() + 1)).padStart(2,'0')}` };
      } else if (kind === 'prevMonth') {
        const prev = new Date(yyyy, now.getMonth() - 1, 1);
        const py = prev.getFullYear();
        const pm = String(prev.getMonth() + 1).padStart(2, '0');
        state.period = { mode: 'range', single: '', from: `${py}-${pm}-01`, to: `${py}-${pm}-${String(daysInMonth(py, prev.getMonth() + 1)).padStart(2,'0')}` };
      } else {
        state.period = { mode: 'all', single: '', from: '', to: '' };
      }
      ui.operationsPage = 1;
      save();
      $('periodPopover').classList.remove('active');
    }

    function periodLabel() {
      if (state.period.mode === 'single' && state.period.single) return `Период: ${formatDate(state.period.single)}`;
      if (state.period.mode === 'range' && state.period.from && state.period.to) return `Период: ${formatDate(state.period.from)} — ${formatDate(state.period.to)}`;
      return 'Период: Все время';
    }

    function operationsInPeriod(includeOutsideAnalytics = true) {
      return state.operations.filter(op => {
        if (!includeOutsideAnalytics && !op.includeInAnalytics) return false;
        if (state.period.mode === 'single' && state.period.single) return op.date === state.period.single;
        if (state.period.mode === 'range' && state.period.from && state.period.to) return op.date >= state.period.from && op.date <= state.period.to;
        return true;
      });
    }

    function analyticsOperationsInPeriod() { return operationsInPeriod(false); }

    function analyticsOperationsForReports() {
      const range = getCappedPeriodRange();
      if (!range) return [];
      return analyticsOperationsInPeriod().filter(op => op.date >= range.from && op.date <= range.to);
    }

    function renderOperations() {
      const categories = activeCategories().map(c => ({ value: c.id, label: c.name }));
      const selectedCategory = ui.operationFilters.categoryId;
      const subsSource = selectedCategory === 'all'
        ? activeSubcategories().map(s => ({
            value: s.id,
            label: `${s.name} — ${getCategory(s.categoryId)?.name || '—'}`,
          }))
        : activeSubcategories().filter(s => s.categoryId === selectedCategory).map(s => ({ value: s.id, label: s.name }));
      $('operationsFilters').innerHTML = `
        <div class="field"><label>Категория</label><input type="hidden" id="fCategory" value="${escapeHtml(ui.operationFilters.categoryId)}" /><div class="search-input-wrap"><input id="fCategoryInput" type="text" list="fCategoryList" placeholder="Все категории" autocomplete="off" /><button type="button" class="input-clear" id="fCategoryClear" aria-label="Открыть список"></button></div><datalist id="fCategoryList"></datalist></div>
        <div class="field"><label>Подкатегория</label><input type="hidden" id="fSubcategory" value="${escapeHtml(ui.operationFilters.subcategoryId)}" /><div class="search-input-wrap"><input id="fSubcategoryInput" type="text" list="fSubcategoryList" placeholder="Все подкатегории" autocomplete="off" /><button type="button" class="input-clear" id="fSubcategoryClear" aria-label="Открыть список"></button></div><datalist id="fSubcategoryList"></datalist></div>
        <div class="field"><label>В аналитике</label><select id="fAnalytics"><option value="all" ${ui.operationFilters.analytics==='all'?'selected':''}>Все</option><option value="yes" ${ui.operationFilters.analytics==='yes'?'selected':''}>Да</option><option value="no" ${ui.operationFilters.analytics==='no'?'selected':''}>Нет</option><option value="debt-open" ${ui.operationFilters.analytics==='debt-open'?'selected':''}>Долг не отдали</option><option value="debt-repaid" ${ui.operationFilters.analytics==='debt-repaid'?'selected':''}>Долг отдали</option></select></div>
        <div class="field"><label>Поиск</label><input id="fSearch" type="text" value="${escapeHtml(ui.operationFilters.search)}" placeholder="Описание" /></div>
        <div class="field"><label>&nbsp;</label><button class="btn btn-ghost" id="resetOpFilters">Сбросить фильтры</button></div>
      `;
      bindLookupField({
        inputId: 'fCategoryInput',
        clearButtonId: 'fCategoryClear',
        listId: 'fCategoryList',
        hiddenId: 'fCategory',
        options: categories,
        selectedValue: ui.operationFilters.categoryId,
        placeholder: 'Все категории',
        emptyValue: 'all',
        onChange: (value) => {
          ui.operationFilters.categoryId = value || 'all';
          ui.operationFilters.subcategoryId = 'all';
          ui.operationsPage = 1;
          renderOperations();
        },
      });
      bindLookupField({
        inputId: 'fSubcategoryInput',
        clearButtonId: 'fSubcategoryClear',
        listId: 'fSubcategoryList',
        hiddenId: 'fSubcategory',
        options: subsSource,
        selectedValue: ui.operationFilters.subcategoryId,
        placeholder: 'Все подкатегории',
        emptyValue: 'all',
        onChange: (value) => {
          ui.operationFilters.subcategoryId = value || 'all';
          ui.operationsPage = 1;
          renderOperationsTable();
        },
      });
      $('fAnalytics').addEventListener('change', e => {
        ui.operationFilters.analytics = e.target.value;
        ui.operationsPage = 1;
        renderOperationsTable();
      });
      $('fSearch').addEventListener('input', e => {
        ui.operationFilters.search = e.target.value;
        ui.operationsPage = 1;
        renderOperationsTable();
      });
      $('resetOpFilters').addEventListener('click', () => {
        ui.operationFilters = { categoryId:'all', subcategoryId:'all', analytics:'all', search:'' };
        ui.operationsPage = 1;
        renderOperations();
      });
      renderOperationsTable();
    }

    function filteredOperations() {
      const search = ui.operationFilters.search.trim().toLowerCase();
      let rows = operationsInPeriod(true).filter(op => {
        const realCategoryId = getSubcategory(op.subcategoryId)?.categoryId || op.categoryId;
        if (ui.operationFilters.categoryId !== 'all' && realCategoryId !== ui.operationFilters.categoryId) return false;
        if (ui.operationFilters.subcategoryId !== 'all' && op.subcategoryId !== ui.operationFilters.subcategoryId) return false;
        if (ui.operationFilters.analytics === 'yes' && !op.includeInAnalytics) return false;
        if (ui.operationFilters.analytics === 'no' && op.includeInAnalytics) return false;
        if (ui.operationFilters.analytics === 'debt-open' && op.debtStatus !== 'open') return false;
        if (ui.operationFilters.analytics === 'debt-repaid' && op.debtStatus !== 'repaid') return false;
        if (search && !(op.description || '').toLowerCase().includes(search)) return false;
        return true;
      });
      if (ui.operationSort.amount) {
        rows = rows.slice().sort((a,b) => {
          const sa = signedAmount(a), sb = signedAmount(b);
          return ui.operationSort.amount === 'asc' ? sa - sb : sb - sa;
        });
      } else if (ui.operationSort.date) {
        rows = rows.slice().sort((a,b) => ui.operationSort.date === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));
      } else {
        rows = rows.slice().sort((a,b) => b.date.localeCompare(a.date));
      }
      return rows;
    }

    function renderOperationsTable() {
      const rows = filteredOperations();
      renderOperationsStats(rows);
      if (!rows.length) {
        $('operationsTableWrap').innerHTML = '<div class="empty">Операций по выбранным условиям нет.</div>';
        return;
      }
      const totalRows = rows.length;
      const totalPages = Math.max(1, Math.ceil(totalRows / ui.operationsPerPage));
      ui.operationsPage = Math.min(Math.max(ui.operationsPage, 1), totalPages);
      const start = (ui.operationsPage - 1) * ui.operationsPerPage;
      const pageRows = rows.slice(start, start + ui.operationsPerPage);
      const rangeFrom = start + 1;
      const rangeTo = start + pageRows.length;

      $('operationsTableWrap').innerHTML = `
        <div class="table-with-pagination">
          <div class="table-wrap operations-table">
            <table>
              <thead>
                <tr>
                  <th class="sortable" id="sortDateHead">Дата ${sortMarker('date')}</th>
                  <th>Тип</th>
                  <th>Категория</th>
                  <th>Подкатегория</th>
                  <th>Описание</th>
                  <th>Статус</th>
                  <th class="num sortable" id="sortAmountHead">Сумма ${sortMarker('amount')}</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody>
                ${pageRows.map(op => {
                  const sub = getSubcategory(op.subcategoryId);
                  const cat = getCategory(sub?.categoryId || op.categoryId);
                  const type = cat?.type || 'expense';
                  return `
                    <tr>
                      <td>${formatDate(op.date)}</td>
                      <td><span class="badge ${type}">${type==='expense'?'Расход':'Доход'}</span></td>
                      <td title="${escapeHtml(cat?.name || '—')}"><span class="ellipsis">${escapeHtml(cat?.name || '—')}</span></td>
                      <td title="${escapeHtml(sub?.name || '—')}"><span class="ellipsis">${escapeHtml(sub?.name || '—')}</span></td>
                      <td title="${escapeHtml(op.description || '—')}"><span class="ellipsis">${escapeHtml(op.description || '—')}</span></td>
                      <td>${renderOperationStatus(op)}</td>
                      <td class="num ${type}">${type==='expense'?'− ':'+ '}${formatMoney(op.amount)}</td>
                      <td>
                        <div class="actions-inline">
                          <button class="btn btn-ghost" data-edit-op="${op.id}">Редактировать</button>
                          <button class="btn btn-danger" data-del-op="${op.id}">Удалить</button>
                        </div>
                      </td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <div class="pagination-info">${rangeFrom}–${rangeTo} из ${totalRows}</div>
            <div class="pagination-controls">
              <label class="muted" for="operationsPerPageSelect">На странице</label>
              <select id="operationsPerPageSelect">
                ${[10,25,50,100].map(size => `<option value="${size}" ${ui.operationsPerPage === size ? 'selected' : ''}>${size}</option>`).join('')}
              </select>
              <button class="btn btn-ghost" id="operationsPrevBtn" ${ui.operationsPage === 1 ? 'disabled' : ''}>Назад</button>
              <div class="pagination-page">Стр. ${ui.operationsPage} / ${totalPages}</div>
              <button class="btn btn-ghost" id="operationsNextBtn" ${ui.operationsPage === totalPages ? 'disabled' : ''}>Вперёд</button>
            </div>
          </div>
        </div>
      `;
      $('sortDateHead').addEventListener('click', cycleDateSort);
      $('sortAmountHead').addEventListener('click', cycleAmountSort);
      $('operationsPerPageSelect').addEventListener('change', (e) => {
        ui.operationsPerPage = Number(e.target.value) || 25;
        ui.operationsPage = 1;
        renderOperationsTable();
      });
      $('operationsPrevBtn').addEventListener('click', () => {
        ui.operationsPage = Math.max(1, ui.operationsPage - 1);
        renderOperationsTable();
      });
      $('operationsNextBtn').addEventListener('click', () => {
        ui.operationsPage = Math.min(totalPages, ui.operationsPage + 1);
        renderOperationsTable();
      });
      document.querySelectorAll('[data-edit-op]').forEach(btn => btn.addEventListener('click', () => openOperationModal(btn.dataset.editOp)));
      document.querySelectorAll('[data-del-op]').forEach(btn => btn.addEventListener('click', () => deleteOperation(btn.dataset.delOp)));
    }

    function renderOperationsStats(rows) {
      const expense = round2(rows.filter(op => getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type === 'expense').reduce((sum, op) => sum + op.amount, 0));
      const income = round2(rows.filter(op => getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type === 'income').reduce((sum, op) => sum + op.amount, 0));
      const difference = round2(income - expense);
      $('operationsStatsWrap').innerHTML = `
        <div class="stats-row">
          <div class="stats-card"><div class="kpi-label">Операций</div><div class="kpi-value neutral">${rows.length}</div></div>
          <div class="stats-card"><div class="kpi-label">Доходы</div><div class="kpi-value income">+ ${formatMoney(income)}</div></div>
          <div class="stats-card"><div class="kpi-label">Расходы</div><div class="kpi-value expense">− ${formatMoney(expense)}</div></div>
          <div class="stats-card"><div class="kpi-label">Разница</div><div class="kpi-value ${difference < 0 ? 'expense' : 'income'}">${difference < 0 ? '− ' : '+ '}${formatMoney(Math.abs(difference))}</div></div>
        </div>
      `;
    }

    function renderOperationsHistory() {
      const rows = state.operations.slice().sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''))).slice(0, 10);
      if (!rows.length) {
        $('operationsHistoryWrap').innerHTML = '';
        return;
      }
      $('operationsHistoryWrap').innerHTML = `
        <div class="panel" style="padding:18px;">
          <div class="section-head" style="margin-bottom:12px;"><h3>Последние изменения</h3></div>
          <div class="history-list">
            ${rows.map(op => {
              const sub = getSubcategory(op.subcategoryId);
              const cat = getCategory(sub?.categoryId || op.categoryId);
              const actionLabel = op.lastAction === 'updated' ? 'Изменена' : 'Добавлена';
              const actionClass = op.lastAction === 'updated' ? 'action-edit' : 'action-add';
              return `
                <div class="history-card">
                  <div class="history-main">
                    <div class="history-title">
                      <span class="badge ${actionClass}">${actionLabel}</span>
                      <strong class="ellipsis">${escapeHtml(cat?.name || '—')} — ${escapeHtml(sub?.name || '—')}</strong>
                    </div>
                    <div class="history-meta">${formatDate(op.date)} • ${formatMoney(op.amount)}</div>
                  </div>
                  <div class="history-actions">
                    <button class="btn btn-ghost" data-history-open="${op.id}">Открыть</button>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `;
      document.querySelectorAll('[data-history-open]').forEach(btn => btn.addEventListener('click', () => openOperationModal(btn.dataset.historyOpen)));
    }

    function renderOperationStatus(op) {
      if (op.includeInAnalytics) return '<span class="badge income">В аналитике</span>';
      if (op.debtStatus === 'open') return '<span class="badge debt-open">Долг не отдали</span>';
      if (op.debtStatus === 'repaid') return '<span class="badge debt-repaid">Долг отдали</span>';
      return '<span class="badge out">Нет</span>';
    }

    function sortMarker(key) {
      const value = ui.operationSort[key];
      if (key === 'date') return value === 'desc' ? '↓' : value === 'asc' ? '↑' : '';
      return value === 'asc' ? '↑' : value === 'desc' ? '↓' : '';
    }

    function cycleDateSort() {
      ui.operationSort.amount = null;
      ui.operationSort.date = ui.operationSort.date === null ? 'desc' : ui.operationSort.date === 'desc' ? 'asc' : null;
      ui.operationsPage = 1;
      renderOperationsTable();
    }

    function cycleAmountSort() {
      ui.operationSort.date = null;
      ui.operationSort.amount = ui.operationSort.amount === null ? 'asc' : ui.operationSort.amount === 'asc' ? 'desc' : null;
      ui.operationsPage = 1;
      renderOperationsTable();
    }

    function openOperationModal(id = null) {
      $('opCategory').value = '';
      $('opSubcategory').value = '';
      fillModalCategories(id);
      if (id) {
        const op = state.operations.find(x => x.id === id);
        if (!op) return;
        const realCategoryId = getSubcategory(op.subcategoryId)?.categoryId || op.categoryId;
        $('operationModalTitle').textContent = 'Редактирование операции';
        $('operationId').value = op.id;
        $('opCategory').value = realCategoryId;
        fillModalCategories(id);
        onModalCategoryChange(op.subcategoryId);
        $('opSubcategory').value = op.subcategoryId;
        syncModalType();
        $('opDate').value = op.date;
        $('opAmount').value = op.amount;
        $('opDescription').value = op.description || '';
        $('opAnalytics').checked = op.includeInAnalytics;
        $('opSubscriptionValidUntil').value = op.subscriptionValidUntil || '';
        $('opSubscriptionMonths').value = op.subscriptionPeriodMonths || '';
        setDebtRadio(op.debtStatus || 'open');
        syncDebtControls();
        syncSubscriptionControls();
        $('deleteOperationBtn').style.display = 'inline-flex';
      } else {
        $('operationModalTitle').textContent = 'Новая операция';
        $('operationId').value = '';
        $('operationForm').reset();
        $('opDate').value = state.settings.lastOperationDate || todayISO();
        $('opCategory').value = '';
        $('opSubcategory').value = '';
        fillModalCategories();
        onModalCategoryChange();
        $('opAnalytics').checked = true;
        $('opSubscriptionValidUntil').value = '';
        $('opSubscriptionMonths').value = '';
        setDebtRadio('open');
        $('deleteOperationBtn').style.display = 'none';
        syncModalType();
        syncDebtControls();
        syncSubscriptionControls();
      }
      $('operationModalBackdrop').classList.add('active');
    }

    function closeOperationModal() { $('operationModalBackdrop').classList.remove('active'); }

    function fillModalCategories(editOperationId = null) {
      const list = activeCategories().slice();
      if (editOperationId) {
        const op = state.operations.find(x => x.id === editOperationId);
        const cat = getCategory(getSubcategory(op?.subcategoryId)?.categoryId || op?.categoryId);
        if (cat && !list.some(x => x.id === cat.id)) list.unshift(cat);
      }
      const options = list.map(c => ({ value: c.id, label: `${c.name}${c.archived ? ' (архив)' : ''}` }));
      bindLookupField({
        inputId: 'opCategoryInput',
        clearButtonId: 'opCategoryClear',
        listId: 'opCategoryList',
        hiddenId: 'opCategory',
        options,
        selectedValue: $('opCategory').value || '',
        placeholder: 'Начни вводить категорию',
        onChange: () => {
          $('opSubcategory').value = '';
          onModalCategoryChange();
        },
      });
    }

    function onModalCategoryChange(preferredSubcategoryId = null) {
      const categoryId = $('opCategory').value;
      let subs = activeSubcategories().filter(s => s.categoryId === categoryId);
      if (preferredSubcategoryId) {
        const preferred = getSubcategory(preferredSubcategoryId);
        if (preferred && preferred.categoryId === categoryId && !subs.some(s => s.id === preferred.id)) subs.unshift(preferred);
      }
      const options = subs.map(s => ({ value: s.id, label: `${s.name}${s.archived ? ' (архив)' : ''}` }));
      bindLookupField({
        inputId: 'opSubcategoryInput',
        clearButtonId: 'opSubcategoryClear',
        listId: 'opSubcategoryList',
        hiddenId: 'opSubcategory',
        options,
        selectedValue: preferredSubcategoryId || $('opSubcategory').value || '',
        placeholder: categoryId ? 'Начни вводить подкатегорию' : 'Сначала выбери категорию',
        disabled: !categoryId,
        onChange: () => {
          syncModalType();
          applyFixedAmountForSelectedSubcategory();
        },
      });
      $('opType').value = categoryId ? (getCategory(categoryId)?.type === 'expense' ? 'Расход' : 'Доход') : '';
      syncSubscriptionControls();
    }

    function syncModalType() {
      const categoryId = $('opCategory').value;
      $('opType').value = categoryId ? (getCategory(categoryId)?.type === 'expense' ? 'Расход' : 'Доход') : '';
      syncSubscriptionControls();
    }

    function syncSubscriptionControls() {
      const isSubscription = isSubscriptionsCategory($('opCategory').value);
      $('opSubscriptionField').style.display = isSubscription ? 'flex' : 'none';
      if (!isSubscription) {
        $('opSubscriptionValidUntil').value = '';
        $('opSubscriptionMonths').value = '';
      }
      syncSubscriptionPresetButtons();
    }

    function applySubscriptionPreset(monthsValue) {
      const months = Number(monthsValue);
      const date = $('opDate').value;
      if (!date || !months) return;
      $('opSubscriptionMonths').value = String(months);
      $('opSubscriptionValidUntil').value = addMonthsISO(date, months);
      syncSubscriptionPresetButtons();
    }

    function syncSubscriptionPresetDate() {
      const months = Number($('opSubscriptionMonths').value || 0);
      if (!months) return;
      const date = $('opDate').value;
      if (!date) return;
      $('opSubscriptionValidUntil').value = addMonthsISO(date, months);
      syncSubscriptionPresetButtons();
    }

    function syncSubscriptionPresetButtons() {
      const activeMonths = String($('opSubscriptionMonths').value || '');
      document.querySelectorAll('[data-sub-months]').forEach(btn => btn.classList.toggle('active', btn.dataset.subMonths === activeMonths));
    }

    function applyFixedAmountForSelectedSubcategory() {
      if ($('operationId').value) return;
      const sub = getSubcategory($('opSubcategory').value);
      if (!sub || !Number.isFinite(Number(sub.fixedAmount)) || Number(sub.fixedAmount) <= 0) return;
      $('opAmount').value = sub.fixedAmount;
    }

    function syncDebtControls() {
      const visible = !$('opAnalytics').checked;
      $('opDebtStatusField').style.display = visible ? 'flex' : 'none';
    }

    function getDebtRadioValue() {
      return document.querySelector('input[name="opDebtStatus"]:checked')?.value || 'open';
    }

    function setDebtRadio(value) {
      const target = document.querySelector(`input[name="opDebtStatus"][value="${value}"]`) || document.querySelector('input[name="opDebtStatus"][value="open"]');
      if (target) target.checked = true;
    }

    function saveOperationFromModal() {
      const id = $('operationId').value;
      const categoryId = $('opCategory').value;
      const subcategoryId = $('opSubcategory').value;
      const date = $('opDate').value;
      const amount = Number($('opAmount').value);
      const description = $('opDescription').value.trim();
      const includeInAnalytics = $('opAnalytics').checked;
      const debtStatus = includeInAnalytics ? null : getDebtRadioValue();
      const subscriptionValidUntil = $('opSubscriptionValidUntil').value || '';
      const subscriptionPeriodMonths = getSubscriptionCoverageMonths(date, subscriptionValidUntil, Number($('opSubscriptionMonths').value || 0));
      const existingOp = id ? state.operations.find(op => op.id === id) : null;
      const stamp = nowTimestamp();
      if (!categoryId) return alert('Выбери категорию.');
      if (!subcategoryId) return alert('Выбери подкатегорию.');
      const sub = getSubcategory(subcategoryId);
      if (!sub || sub.categoryId !== categoryId) return alert('Подкатегория не принадлежит выбранной категории.');
      if (!date) return alert('Выбери дату.');
      if (!Number.isFinite(amount) || amount <= 0) return alert('Сумма должна быть больше нуля.');
      if (isSubscriptionsCategory(categoryId) && !subscriptionValidUntil) return alert('Для подписки укажи, до какой даты она действует.');
      const payload = {
        id: id || uid('op'),
        categoryId,
        subcategoryId,
        date,
        amount: round2(amount),
        description,
        includeInAnalytics,
        debtStatus,
        createdAt: existingOp?.createdAt || stamp,
        updatedAt: stamp,
        lastAction: existingOp ? 'updated' : 'created',
        subscriptionValidUntil: isSubscriptionsCategory(categoryId) ? subscriptionValidUntil : '',
        subscriptionPeriodMonths: isSubscriptionsCategory(categoryId) ? (subscriptionPeriodMonths || null) : null,
      };
      state.settings.lastOperationDate = date;
      state.settings.lastOperationCategoryId = '';
      state.settings.lastOperationSubcategoryId = '';
      const isNew = !id;
      if (id) state.operations = state.operations.map(op => op.id === id ? payload : op);
      else state.operations.push(payload);

      if (isSubscriptionsCategory(categoryId)) {
        state.subcategories = state.subcategories.map(item => item.id === subcategoryId ? {
          ...item,
          subscriptionValidUntil,
          subscriptionStateSource: 'operation',
          subscriptionLastAmount: round2(amount),
          subscriptionPeriodMonths: subscriptionPeriodMonths || null,
          subscriptionLastOperationDate: date,
        } : item);
      }

      closeOperationModal();
      save();
      if (isNew) {
        const cat = getCategory(categoryId);
        const subcat = getSubcategory(subcategoryId);
        showToast('Операция добавлена:', `${cat?.name || '—'} - ${subcat?.name || '—'} - ${formatMoney(amount)}`);
      }
    }

    function deleteOperationFromModal() {
      const id = $('operationId').value;
      if (!id) return;
      deleteOperation(id, true);
    }

    function deleteOperation(id, fromModal = false) {
      const op = state.operations.find(x => x.id === id);
      if (!op) return;
      if (!confirm(`Удалить операцию от ${formatDate(op.date)} на сумму ${formatMoney(op.amount)}?`)) return;
      state.operations = state.operations.filter(x => x.id !== id);
      if (fromModal) closeOperationModal();
      save();
    }

    function renderReports() {
      const ops = analyticsOperationsForReports();
      const income = sumByType(ops, 'income');
      const expense = sumByType(ops, 'expense');
      const result = round2(income - expense);
      const days = currentPeriodDays();
      const avgIncome = days ? income / days : 0;
      const avgExpense = days ? expense / days : 0;
      $('reportKpis').innerHTML = `
        ${kpi('Доходы за период', `+ ${formatMoney(income)}`, 'income')}
        ${kpi('Средний доход за день', `+ ${formatMoney(avgIncome)}`, 'income')}
        ${kpi('Расходы за период', `− ${formatMoney(expense)}`, 'expense')}
        ${kpi('Средний расход за день', `− ${formatMoney(avgExpense)}`, 'expense')}
        ${kpi('Результат', `${result < 0 ? '− ' : '+ '}${formatMoney(Math.abs(result))}`, result < 0 ? 'expense' : 'income')}
      `;
      renderMonthlyTable();
    }

    function kpi(label, value, cls) {
      return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value ${cls}">${value}</div></div>`;
    }

    function renderMonthlyTable() {
      const rows = overviewMonthlyRows().slice().reverse();
      if (!rows.length) {
        $('monthlyTableWrap').innerHTML = '<div class="empty">Нет данных для обзорного блока.</div>';
        return;
      }
      const totalRows = rows.length;
      const totalPages = Math.max(1, Math.ceil(totalRows / MONTHLY_OVERVIEW_PAGE_SIZE));
      ui.monthlyOverviewPage = Math.min(Math.max(ui.monthlyOverviewPage, 1), totalPages);
      const start = (ui.monthlyOverviewPage - 1) * MONTHLY_OVERVIEW_PAGE_SIZE;
      const pageRows = rows.slice(start, start + MONTHLY_OVERVIEW_PAGE_SIZE);
      const rangeFrom = start + 1;
      const rangeTo = start + pageRows.length;
      $('monthlyTableWrap').innerHTML = `
        <div class="table-with-pagination">
          <div class="table-wrap"><table>
            <thead><tr><th class="label-cell">Месяц</th><th class="num">Доход</th><th class="num">Расход</th><th class="num">Результат</th></tr></thead>
            <tbody>
              ${pageRows.map(r => `<tr>
                <td class="label-cell" title="${r.label}"><span class="ellipsis">${r.label}</span></td>
                <td class="num income">+ ${formatMoney(r.income)}</td>
                <td class="num expense">− ${formatMoney(r.expense)}</td>
                <td class="num ${r.result < 0 ? 'expense' : 'income'}">${r.result < 0 ? '− ' : '+ '}${formatMoney(Math.abs(r.result))}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>
          <div class="pagination-bar">
            <div class="pagination-info">${rangeFrom}–${rangeTo} из ${totalRows} месяцев</div>
            <div class="pagination-controls">
              <button class="btn btn-ghost" id="monthlyPrevBtn" ${ui.monthlyOverviewPage === 1 ? 'disabled' : ''}>Назад</button>
              <div class="pagination-page">Стр. ${ui.monthlyOverviewPage} / ${totalPages}</div>
              <button class="btn btn-ghost" id="monthlyNextBtn" ${ui.monthlyOverviewPage === totalPages ? 'disabled' : ''}>Вперёд</button>
            </div>
          </div>
        </div>`;
      $('monthlyPrevBtn').addEventListener('click', () => {
        ui.monthlyOverviewPage = Math.max(1, ui.monthlyOverviewPage - 1);
        renderMonthlyTable();
      });
      $('monthlyNextBtn').addEventListener('click', () => {
        ui.monthlyOverviewPage = Math.min(totalPages, ui.monthlyOverviewPage + 1);
        renderMonthlyTable();
      });
    }

    function renderExpenseBreakdown(ops) {
      const expenseOps = ops.filter(op => getCategory(getSubcategory(op.subcategoryId)?.categoryId || op.categoryId)?.type === 'expense');
      if (!expenseOps.length) {
        $('expenseBreakdownWrap').innerHTML = '<div class="empty">Нет расходов за выбранный период.</div>';
        return;
      }
      const totalExpense = expenseOps.reduce((sum, op) => sum + op.amount, 0);
      const grouped = new Map();
      expenseOps.forEach(op => {
        const sub = getSubcategory(op.subcategoryId);
        const cat = getCategory(sub?.categoryId || op.categoryId);
        if (!cat || !sub) return;
        if (!grouped.has(cat.id)) grouped.set(cat.id, { categoryName: cat.name, amount: 0, subs: new Map() });
        const group = grouped.get(cat.id);
        group.amount += op.amount;
        if (!group.subs.has(sub.id)) group.subs.set(sub.id, { name: sub.name, amount: 0 });
        const sg = group.subs.get(sub.id);
        sg.amount += op.amount;
      });
      const rows = [...grouped.values()].sort((a,b)=>b.amount-a.amount);
      $('expenseBreakdownWrap').innerHTML = `
        <div class="breakdown-groups">
          ${rows.map((group, index) => {
            const groupPct = totalExpense ? (group.amount / totalExpense) * 100 : 0;
            const subRows = [...group.subs.values()].sort((a,b)=>b.amount-a.amount);
            return `
              <details class="breakdown-group" ${index === 0 ? 'open' : ''}>
                <summary class="breakdown-summary">
                  <div class="breakdown-title" title="${escapeHtml(group.categoryName)}">
                    <span class="breakdown-caret">▶</span>
                    <strong class="ellipsis">${escapeHtml(group.categoryName)}</strong>
                  </div>
                  <div class="breakdown-meta">
                    <div><small>Доля</small><strong>${groupPct.toFixed(1)}%</strong></div>
                    <div><small>Сумма</small><strong class="expense">− ${formatMoney(group.amount)}</strong></div>
                  </div>
                </summary>
                <div class="breakdown-body">
                  <div class="table-wrap breakdown-subtable">
                    <table>
                      <thead>
                        <tr>
                          <th class="label-cell">Подкатегория</th>
                          <th class="num">Доля в категории</th>
                          <th class="num">Сумма</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${subRows.map(sub => `
                          <tr>
                            <td class="label-cell" title="${escapeHtml(sub.name)}"><span class="ellipsis">${escapeHtml(sub.name)}</span></td>
                            <td class="num">${group.amount ? ((sub.amount / group.amount) * 100).toFixed(1) : '0.0'}%</td>
                            <td class="num expense">− ${formatMoney(sub.amount)}</td>
                          </tr>
                        `).join('')}
                      </tbody>
                    </table>
                  </div>
                </div>
              </details>
            `;
          }).join('')}
        </div>`;
    }

    function renderDashboard() {
      const periodOps = analyticsOperationsForReports();
      const totals = categoryTotals(periodOps);
      renderTopBars(totals.expense.slice(0,5), totals.expense.reduce((sum, row) => sum + row.amount, 0));
      renderChangesPanel();
      renderSubscriptionsPanel();
    }

    function renderChangesPanel() {
      const titleEl = $('changesTitle');
      const panelState = getChangesPanelState();
      const baseTitle = 'Сравнение с предыдущим периодом';
      if (panelState.previousLabel) {
        titleEl.innerHTML = `${baseTitle}<span class="title-inline-period">"${escapeHtml(panelState.previousLabel)}"</span>`;
      } else {
        titleEl.textContent = baseTitle;
      }
      if (panelState.status === 'all_time') {
        $('changesWrap').innerHTML = '<div class="empty">Недоступно для периода «За всё время».</div>';
        return;
      }
      if (panelState.status === 'no_data') {
        $('changesWrap').innerHTML = '<div class="empty">Недоступно из-за отсутствия данных.</div>';
        return;
      }
      if (panelState.status === 'incomplete_previous') {
        $('changesWrap').innerHTML = '<div class="empty">Недоступно из-за неполных данных в предыдущем периоде.</div>';
        return;
      }
      const selectedComparisonNames = state.categories
        .filter(cat => cat.type === 'expense' && cat.showInComparison === true)
        .map(cat => cat.name);
      if (!selectedComparisonNames.length) {
        $('changesWrap').innerHTML = '<div class="empty">Необходимо добавить отображение в карточке категории.</div>';
        return;
      }
      const sortedRows = buildChangeRows(panelState.currentOps, panelState.previousOps, selectedComparisonNames)
        .sort((a, b) => ui.changesSortDir === 'asc' ? a.delta - b.delta : b.delta - a.delta);
      const negativeRows = sortedRows.filter(row => row.delta < 0).slice(0, 5);
      const positiveRows = sortedRows.filter(row => row.delta > 0).slice(0, 5);
      if (!negativeRows.length && !positiveRows.length) {
        $('changesWrap').innerHTML = '<div class="empty">Нет данных по выбранным категориям.</div>';
        return;
      }

      const renderColumn = (label, rows, type) => {
        if (!rows.length) {
          return `
            <div class="compare-col">
              <div class="compare-col-title ${type}">${label}</div>
              <div class="compare-empty">Нет категорий.</div>
            </div>`;
        }
        const maxDelta = Math.max(...rows.map(row => Math.abs(row.delta)), 1);
        const items = rows.map(row => {
          const percentValue = row.previous > 0 ? (row.delta / row.previous) * 100 : 0;
          const fillWidth = Math.max(0, (Math.abs(row.delta) / maxDelta) * 100);
          const sign = row.delta >= 0 ? '+ ' : '− ';
          const tooltip = `Изменение: ${formatPercentChange(percentValue)}`;
          return `
            <div class="compare-item" title="${escapeHtml(tooltip)}">
              <div class="compare-item-label">
                <span class="ellipsis">${escapeHtml(row.name)}</span>
                <span class="compare-item-note">Было ${formatMoney(row.previous)}</span>
              </div>
              <div class="compare-track" title="${escapeHtml(tooltip)}">
                <div class="compare-fill ${type}" style="width: calc(${fillWidth}% - 4px);"></div>
              </div>
              <div class="compare-value ${type === 'pos' ? 'expense' : 'income'}">${sign}${formatMoney(Math.abs(row.delta))}</div>
            </div>`;
        }).join('');
        return `
          <div class="compare-col">
            <div class="compare-col-title ${type}">${label}</div>
            <div class="compare-list">${items}</div>
          </div>`;
      };

      $('changesWrap').innerHTML = `
        <div class="compare-split">
          ${renderColumn('Рост выбранных расходов', positiveRows, 'pos')}
          ${renderColumn('Снижение выбранных расходов', negativeRows, 'neg')}
        </div>`;
    }

    function renderSubscriptionsPanel() {
      const rows = getSubscriptionDashboardRows();
      const monthlyLoad = round2(rows.filter(row => row.isActive).reduce((sum, row) => sum + row.monthlyCost, 0));
      $('subscriptionsTitle').innerHTML = `Подписки <span class="highlight income">${formatMoney(monthlyLoad)} в месяц</span>`;
      if (!rows.length) {
        $('subscriptionsWrap').innerHTML = '<div class="empty">Подписок пока нет.</div>';
        return;
      }
      $('subscriptionsWrap').innerHTML = `
        <div class="list-stack">
          ${rows.map(row => `
            <div class="subscription-row" title="${escapeHtml(row.name)}">
              <div class="subscription-main">
                <strong class="ellipsis">${escapeHtml(row.name)}</strong>
                <div class="subscription-meta">${row.monthlyCost > 0 ? `${formatMoney(row.monthlyCost)} в месяц` : 'Сумма не указана'}</div>
              </div>
              <div class="subscription-side">
                <strong class="${row.statusClass}">${row.statusText}</strong>
                ${row.validUntil ? `<div class="subscription-meta">До ${formatDate(row.validUntil)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    function renderDonut(rows) {
      if (!rows.length) { $('donutWrap').innerHTML = '<div class="empty">Нет данных.</div>'; return; }
      const total = rows.reduce((s,r)=>s+r.amount,0);
      const top = rows.slice(0,5);
      const topTotal = top.reduce((s,r)=>s+r.amount,0);
      const segments = topTotal < total ? [...top, { name: 'Остальное', amount: round2(total - topTotal), color: CHART_COLORS[top.length % CHART_COLORS.length] }] : top;
      let angle = 0;
      const stops = segments.map((seg,i) => {
        seg.color = seg.color || CHART_COLORS[i % CHART_COLORS.length];
        const start = angle;
        angle += (seg.amount / total) * 360;
        return `${seg.color} ${start}deg ${angle}deg`;
      }).join(', ');
      $('donutWrap').innerHTML = `
        <div class="donut-layout">
          <div class="donut" style="background: conic-gradient(${stops});" title="Все расходы: ${formatMoney(total)}">
            <div class="donut-center"><div><div class="muted" style="font-size:13px;">Все расходы</div><div class="donut-total">${formatMoney(total)}</div></div></div>
          </div>
          <div class="legend">
            ${segments.map(seg => `<div class="legend-item" title="${escapeHtml(seg.name)} — ${formatMoney(seg.amount)}"><div class="legend-left"><span class="swatch" style="background:${seg.color}"></span><span class="ellipsis">${escapeHtml(seg.name)}</span></div><strong>${formatMoney(seg.amount)}</strong></div>`).join('')}
          </div>
        </div>`;
    }

    function renderIncomeExpenseBars(rows) {
      if (!rows.length) { $('barsWrap').innerHTML = '<div class="empty">Нет данных.</div>'; return; }
      const max = Math.max(...rows.map(r => Math.max(r.income, r.expense)), 1);
      $('barsWrap').innerHTML = `
        <div class="bars">
          ${rows.map(r => `<div class="bar-col" title="${r.label} • Доходы: ${formatMoney(r.income)} • Расходы: ${formatMoney(r.expense)}">
            <div class="bar-stack">
              <div class="bar income" style="height:${(r.income / max) * 100}%"></div>
              <div class="bar expense" style="height:${(r.expense / max) * 100}%"></div>
            </div>
            <div class="muted" style="font-size:13px; text-align:center;">${r.shortLabel}</div>
          </div>`).join('')}
        </div>`;
    }

    function renderTopBars(rows, fullExpenseTotal = 0) {
      if (!rows.length) { $('topBarsWrap').innerHTML = '<div class="empty">Нет данных.</div>'; return; }
      const max = Math.max(...rows.map(r => r.amount), 1);
      $('topBarsWrap').innerHTML = `<div class="top-bars">${rows.map((r,i) => {
        const pct = fullExpenseTotal ? (r.amount / fullExpenseTotal) * 100 : 0;
        const fillWidth = Math.max(8, (r.amount / max) * 78);
        return `<div class="top-row" title="${escapeHtml(r.name)} — ${formatMoney(r.amount)} • ${pct.toFixed(1)}%"><div class="ellipsis">${escapeHtml(r.name)}</div><div class="track"><div class="fill" style="width:${fillWidth}%; background:${CHART_COLORS[i % CHART_COLORS.length]};"></div><span class="track-pct">${Math.round(pct)}%</span></div><div class="num">${formatMoney(r.amount)}</div></div>`;
      }).join('')}</div>`;
    }

    function renderCategories() {
      const categories = state.categories.slice().sort((a,b) => {
        const systemDiff = Number(isSubscriptionsCategory(b)) - Number(isSubscriptionsCategory(a));
        if (systemDiff !== 0) return systemDiff;
        const archivedDiff = Number(a.archived) - Number(b.archived);
        if (archivedDiff !== 0) return archivedDiff;
        return a.name.localeCompare(b.name, 'ru');
      });
      $('categoriesList').innerHTML = categories.length ? categories.map(c => `
        <div class="item-card ${ui.selectedCategoryId === c.id ? 'active' : ''}" data-cat="${c.id}">
          <div class="category-row">
            <div class="item-main">
              <strong class="ellipsis" title="${escapeHtml(c.name)}">${escapeHtml(c.name)}</strong>
              <span class="badge ${c.type}">${c.type==='expense'?'Расход':'Доход'}</span>
            </div>
            <div class="item-actions">
              ${isSubscriptionsCategory(c) ? '<span class="badge system-badge">Системная</span>' : ''}
              ${isSubscriptionsCategory(c) ? '' : `<button class="btn ${c.archived ? 'btn-success' : 'btn-amber'}" data-archive-cat="${c.id}">${c.archived ? 'Вернуть' : 'В архив'}</button>`}
              ${canDeleteCategory(c.id) ? `<button class="btn btn-danger" data-delete-cat="${c.id}">Удалить</button>` : ''}
              ${isSubscriptionsCategory(c) ? '' : `<button class="btn btn-ghost" data-edit-cat="${c.id}">Редактировать</button>`}
            </div>
          </div>
        </div>
      `).join('') : '<div class="empty">Нет категорий.</div>';
      document.querySelectorAll('[data-cat]').forEach(el => el.addEventListener('click', e => { if (e.target.closest('button')) return; ui.selectedCategoryId = el.dataset.cat; renderCategories(); }));
      document.querySelectorAll('[data-edit-cat]').forEach(el => el.addEventListener('click', () => openEntityModal('category', el.dataset.editCat)));
      document.querySelectorAll('[data-archive-cat]').forEach(el => el.addEventListener('click', () => toggleCategoryArchive(el.dataset.archiveCat)));
      document.querySelectorAll('[data-delete-cat]').forEach(el => el.addEventListener('click', () => deleteCategory(el.dataset.deleteCat)));
      renderSubcategories();
    }

    function renderSubcategories() {
      const cat = getCategory(ui.selectedCategoryId);
      $('subcategoryTitle').textContent = cat ? `${cat.name}` : 'Подкатегории';
      if (!cat) { $('subcategoriesList').innerHTML = '<div class="empty">Сначала выбери категорию.</div>'; return; }
      const subs = state.subcategories.filter(s => s.categoryId === cat.id).sort((a,b)=>Number(a.archived)-Number(b.archived)||a.name.localeCompare(b.name,'ru'));
      $('subcategoriesList').innerHTML = subs.length ? subs.map(s => {
        const validLabel = isSubscriptionsCategory(cat) && s.subscriptionValidUntil ? `<span class="badge out">До ${formatDate(s.subscriptionValidUntil)}</span>` : '';
        const ignoreLabel = isSubscriptionsCategory(cat) && s.ignoreSubscriptionExpired ? '<span class="badge out">Игнор</span>' : '';
        return `
        <div class="sub-row">
          <div style="display:flex; align-items:center; gap:10px; min-width:0; flex-wrap:wrap;">
            <strong class="ellipsis" title="${escapeHtml(s.name)}">${escapeHtml(s.name)}</strong>
            ${s.fixedAmount ? `<span class="badge income">${formatMoney(s.fixedAmount)}</span>` : ''}
            ${validLabel}
            ${ignoreLabel}
            ${s.archived ? '<span class="badge out">Архив</span>' : ''}
          </div>
          <div class="actions-inline" style="justify-content:flex-end;">
            <button class="btn ${s.archived ? 'btn-success' : 'btn-amber'}" data-archive-sub="${s.id}">${s.archived ? 'Вернуть' : 'В архив'}</button>
            ${canDeleteSubcategory(s.id) ? `<button class="btn btn-danger" data-delete-sub="${s.id}">Удалить</button>` : ''}
            <button class="btn btn-ghost" data-edit-sub="${s.id}">Редактировать</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty">Нет подкатегорий.</div>';
      document.querySelectorAll('[data-edit-sub]').forEach(el => el.addEventListener('click', () => openEntityModal('subcategory', el.dataset.editSub)));
      document.querySelectorAll('[data-archive-sub]').forEach(el => el.addEventListener('click', () => toggleSubcategoryArchive(el.dataset.archiveSub)));
      document.querySelectorAll('[data-delete-sub]').forEach(el => el.addEventListener('click', () => deleteSubcategory(el.dataset.deleteSub)));
    }

    function compatibleSubcategoryCategories(categoryId) {
      const baseCategory = getCategory(categoryId);
      if (!baseCategory) return [];
      return state.categories
        .filter(c => c.type === baseCategory.type && (!c.archived || c.id === baseCategory.id))
        .sort((a,b)=>Number(a.archived)-Number(b.archived)||a.name.localeCompare(b.name,'ru'));
    }

    function syncEntityCompareVisibility() {
      const compareField = $('entityCompareField');
      const typeSelect = $('entityType');
      if (!compareField || !typeSelect) return;
      const isExpense = typeSelect.value === 'expense';
      compareField.style.display = isExpense ? 'flex' : 'none';
      if (!isExpense && $('entityShowInComparison')) $('entityShowInComparison').checked = false;
    }

    function openEntityModal(mode, id = null) {
      $('entityMode').value = mode;
      $('entityId').value = id || '';
      $('entityName').value = '';
      $('entityType').value = 'expense';
      $('entityFixedAmount').value = '';
      $('entityCategory').innerHTML = '';
      $('entityCategoryField').style.display = 'none';
      $('entityCompareField').style.display = 'none';
      $('entityShowInComparison').checked = false;
      $('entitySubscriptionFields').style.display = 'none';
      $('entitySubscriptionValidUntil').value = '';
      $('entityIgnoreExpired').checked = false;
      if (mode === 'category') {
        $('entityTitle').textContent = id ? 'Редактирование категории' : 'Новая категория';
        $('entityTypeField').style.display = 'flex';
        $('entityFixedAmountField').style.display = 'none';
        if (id) {
          const cat = getCategory(id); if (!cat) return;
          if (isSubscriptionsCategory(cat)) return alert('Системную категорию «Подписки» редактировать нельзя.');
          $('entityName').value = cat.name;
          $('entityType').value = cat.type;
          $('entityShowInComparison').checked = cat.showInComparison === true;
          $('entityTypeField').style.display = canChangeCategoryType(id) ? 'flex' : 'none';
        }
        syncEntityCompareVisibility();
      } else {
        if (!ui.selectedCategoryId) { alert('Сначала выбери категорию.'); return; }
        $('entityTitle').textContent = id ? 'Редактирование подкатегории' : 'Новая подкатегория';
        $('entityTypeField').style.display = 'none';
        $('entityFixedAmountField').style.display = 'flex';
        if (id) {
          const sub = getSubcategory(id); if (!sub) return;
          const options = compatibleSubcategoryCategories(sub.categoryId);
          $('entityCategoryField').style.display = 'flex';
          $('entityCategory').innerHTML = options.map(cat => `<option value="${escapeHtml(cat.id)}">${escapeHtml(cat.name)}${cat.archived ? ' (архив)' : ''}</option>`).join('');
          $('entityCategory').value = sub.categoryId;
          $('entityName').value = sub.name;
          $('entityFixedAmount').value = sub.fixedAmount ?? '';
          if (isSubscriptionsCategory(sub.categoryId)) {
            $('entitySubscriptionFields').style.display = 'grid';
            $('entitySubscriptionValidUntil').value = sub.subscriptionValidUntil || '';
            $('entityIgnoreExpired').checked = sub.ignoreSubscriptionExpired === true;
          }
        } else if (isSubscriptionsCategory(ui.selectedCategoryId)) {
          $('entitySubscriptionFields').style.display = 'grid';
        }
      }
      syncEntitySubscriptionFields();
      $('categoryModalBackdrop').classList.add('active');
    }

    function closeEntityModal() { $('categoryModalBackdrop').classList.remove('active'); }

    function saveEntity() {
      const mode = $('entityMode').value;
      const id = $('entityId').value;
      const name = $('entityName').value.trim();
      const type = $('entityType').value;
      const fixedAmountRaw = Number($('entityFixedAmount').value);
      const fixedAmount = Number.isFinite(fixedAmountRaw) && fixedAmountRaw > 0 ? round2(fixedAmountRaw) : null;
      const entityValidUntil = $('entitySubscriptionValidUntil')?.value || '';
      const entityIgnoreExpired = $('entityIgnoreExpired')?.checked === true;
      const entityShowInComparison = $('entityShowInComparison')?.checked === true;
      if (!name) return alert('Название не должно быть пустым.');
      if (mode === 'category') {
        const exists = state.categories.some(c => c.id !== id && c.name.trim().toLowerCase() === name.toLowerCase());
        if (exists) return alert('Категория с таким названием уже существует.');
        if (id) {
          if (isSubscriptionsCategory(id)) return alert('Системную категорию «Подписки» редактировать нельзя.');
          state.categories = state.categories.map(c => c.id === id ? { ...c, name, type: canChangeCategoryType(id) ? type : c.type, showInComparison: entityShowInComparison } : c);
        } else {
          const cat = makeCategory(name, type, { showInComparison: entityShowInComparison });
          state.categories.push(cat);
          ui.selectedCategoryId = cat.id;
        }
      } else {
        const currentCategoryId = id ? (getSubcategory(id)?.categoryId || ui.selectedCategoryId) : ui.selectedCategoryId;
        const targetCategoryId = id ? ($('entityCategory').value || currentCategoryId) : ui.selectedCategoryId;
        const compatibleIds = compatibleSubcategoryCategories(currentCategoryId).map(cat => cat.id);
        if (!targetCategoryId || !compatibleIds.includes(targetCategoryId)) return alert('Нельзя перенести подкатегорию в категорию другого типа.');
        const exists = state.subcategories.some(s => s.id !== id && s.categoryId === targetCategoryId && s.name.trim().toLowerCase() === name.toLowerCase());
        if (exists) return alert('Подкатегория с таким названием уже существует в этой категории.');

        const movingIntoSubscriptions = !isSubscriptionsCategory(currentCategoryId) && isSubscriptionsCategory(targetCategoryId);
        if (id && movingIntoSubscriptions) {
          state.subcategories = state.subcategories.map(s => s.id === id ? {
            ...s,
            name,

          }));

      closeEntityModal();

    function uploadBackup(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const snapshot = JSON.stringify(state);
        try {
          const parsed = JSON.parse(String(reader.result || '{}'));
          if (!parsed || !Array.isArray(parsed.categories) || !Array.isArray(parsed.subcategories) || !Array.isArray(parsed.operations)) throw new Error('Неверный формат файла.');
          Object.keys(state).forEach(k => delete state[k]);
          Object.assign(state, parsed);
          ensureDataShape();
          save();
          showToast('Резервная копия загружена', 'Данные успешно восстановлены');
